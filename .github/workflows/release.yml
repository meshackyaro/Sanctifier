name: Release
on:
  push:
    tags:
      - "v*"

permissions: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-release:
    name: Build and Release Binary
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: sanctifier-linux-amd64
            asset_name: sanctifier-linux-amd64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: sanctifier-macos-amd64
            asset_name: sanctifier-macos-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: sanctifier-macos-arm64
            asset_name: sanctifier-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: sanctifier-windows-amd64.exe
            asset_name: sanctifier-windows-amd64.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Z3
        uses: z3prover/setup-z3@v1
        with:
          z3-version: 4.12.2

      - name: Install dependencies (Linux only)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev

      - name: Build sanctifier-cli (Release)
        run: cargo build --release --target ${{ matrix.target }} -p sanctifier-cli

      - name: Prepare binary for upload (Unix)
        if: runner.os != 'Windows'
        run: mv target/${{ matrix.target }}/release/sanctifier ${{ matrix.artifact_name }}

      - name: Prepare binary for upload (Windows)
        if: runner.os == 'Windows'
        run: mv target/${{ matrix.target }}/release/sanctifier.exe ${{ matrix.artifact_name }}

      - name: Generate build provenance (SLSA)
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: ${{ matrix.artifact_name }}

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
