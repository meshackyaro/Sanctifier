name: E2E Tests & Coverage

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Run Tests and Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master (stable)
        with:
          toolchain: stable

      - name: Cache dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run Build
        run: cargo build --package sanctifier-cli --package sanctifier-core --package amm-pool

      - name: Run Unit & E2E Tests
        run: cargo test --package sanctifier-cli --package sanctifier-core --package amm-pool

      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin || true

      - name: Generate Coverage Report
        run: cargo tarpaulin --package sanctifier-cli --package sanctifier-core --package amm-pool --out Xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@ab904c41d6ece82784817410c45d8b8c02684457 # v3
        with:
          file: cobertura.xml
          fail_ci_if_error: false

  action-tests:
    name: Action Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.x"

      - name: Run action integration tests
        run: python -m unittest discover -s tests/action -p "test_*.py" -v
