name: VS Code Extension CI

on:
  push:
    branches:
      - main
    paths:
      - "vscode-extension/**"
      - ".devcontainer/**"
      - ".github/workflows/vscode-extension-ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "vscode-extension/**"
      - ".devcontainer/**"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    defaults:
      run:
        working-directory: vscode-extension

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: vscode-extension/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Compile extension
        run: npm run compile

      - name: Run tests (Linux/macOS)
        if: runner.os != 'Windows'
        run: npm test
        env:
          DISPLAY: :99

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        run: npm test
        shell: pwsh

      - name: Test with spaces in path (Windows)
        if: runner.os == 'Windows'
        run: |
          $testDir = "C:\Program Files\test with spaces"
          New-Item -ItemType Directory -Force -Path $testDir
          Copy-Item -Path "." -Destination "$testDir\vscode-extension" -Recurse
          Set-Location "$testDir\vscode-extension"
          npm test
        shell: pwsh

      - name: Lint extension
        run: npm run lint

      - name: Package extension
        run: npx @vscode/vsce package --no-dependencies
