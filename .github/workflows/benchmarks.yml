name: Performance Benchmarks

on:
  schedule:
    - cron: '0 0 * * *' # Nightly at midnight
  pull_request:
    paths:
      - 'contracts/**'
      - 'tooling/**'
      - 'data/**'
      - 'schemas/**'
      - 'benchmarks/**'
      - 'tests/vulnerability_db/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  benchmark:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Data/schemas JSON performance snapshot
        run: |
          python benchmarks/data_schemas_perf.py --output benchmarks/data_schemas_perf.json
          cat benchmarks/data_schemas_perf.json

      - name: Docs navigation performance snapshot
        run: |
          python benchmarks/docs_nav_perf.py --output benchmarks/docs_nav_perf.json
          cat benchmarks/docs_nav_perf.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install WASM target
        run: rustup target add wasm32-unknown-unknown

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev libudev-dev pkg-config
          export PKG_CONFIG_PATH=/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig:$PKG_CONFIG_PATH
          echo "PKG_CONFIG_PATH=$PKG_CONFIG_PATH" >> $GITHUB_ENV

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install Soroban CLI
        run: cargo install --locked soroban-cli

      - name: Build Contracts
        run: |
          # Build only the contract packages for wasm (tooling crates are native-only).
          cargo build --target wasm32-unknown-unknown --release \
            -p multisig-wallet -p amm-pool -p my-contract -p timelock \
            -p vesting-contract -p reentrancy-guard -p runtime-guard-wrapper \
            -p kani-poc-contract -p flashloan-token -p uups-proxy \
            -p token-with-bugs -p vulnerable-contract -p deposit-withdraw \
            -p governance-contract

      - name: Run Performance Tests
        run: |
          echo "Running gas and time performance tracking..."
          # --all-features is intentionally omitted: soroban-sdk's 'testutils'
          # feature is incompatible with the wasm32 target used by contract crates.
          cargo test --locked -p sanctifier-core -p sanctifier-detector -p sanctifier-cli

      - name: Publish benchmark baseline summary
        if: always()
        run: |
          python3 - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path

          data_path = Path("benchmarks/data_schemas_perf.json")
          docs_path = Path("benchmarks/docs_nav_perf.json")

          print("## Benchmark Baseline")
          print("")

          if not data_path.exists() or not docs_path.exists():
              print("- Benchmark snapshots were not available for summary generation.")
              raise SystemExit(0)

          data = json.loads(data_path.read_text(encoding="utf-8"))
          docs = json.loads(docs_path.read_text(encoding="utf-8"))

          metrics = data.get("metrics", [])
          total_bytes = sum(item.get("bytes", 0) for item in metrics)
          total_read_ms = sum(item.get("read_ms", 0.0) for item in metrics)
          total_parse_ms = sum(item.get("parse_ms", 0.0) for item in metrics)
          total_rules = sum(item.get("vulnerabilities") or 0 for item in metrics)

          kb_per_sec = 0.0
          rules_per_sec = 0.0
          if total_read_ms > 0:
              kb_per_sec = (total_bytes / 1024.0) / (total_read_ms / 1000.0)
          if total_parse_ms > 0:
              rules_per_sec = total_rules / (total_parse_ms / 1000.0)

          print(f"- Source KB/sec: {kb_per_sec:.2f}")
          print(f"- Rules/sec: {rules_per_sec:.2f}")
          print(f"- Docs index size: {docs.get('size_bytes', 0)} bytes")
          print(f"- Docs links: {docs.get('total_links', 0)} total, {docs.get('dead_links_count', 0)} dead")
          PY

      - name: Log Performance Metrics
        run: |
          date >> benchmarks/nightly_perf.log
          echo "Benchmark results recorded."
